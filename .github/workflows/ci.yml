name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Prepare coverage data directory
        run: mkdir -p docs/tests/coverage

      - name: Install package (editable, dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: pytest
        run: python -m pytest

      - name: Coverage (run + report, fail_under from pyproject)
        run: |
          python -m coverage run -m pytest
          python -m coverage report

      - name: black
        run: python -m black --check .

      - name: pylint
        run: python -m pylint src tests

      - name: mypy
        run: python -m mypy src

      - name: flake8
        run: python -m flake8 src tests

      - name: bandit
        run: python -m bandit -r src

      - name: Build sdist/wheel and twine check
        run: |
          rm -rf dist
          python -m build
          python -m twine check dist/*
